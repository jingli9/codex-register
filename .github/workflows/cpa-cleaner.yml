name: CPA 401 认证文件清理 (FULL模式)

on:
  workflow_dispatch:  # 只保留手动触发
    inputs:
      concurrency:
        description: '并发数 (默认: 4)'
        required: false
        default: '4'
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 测试网络连接
        run: |
          echo "测试网络连接..."
          curl -I https://www.google.com || true
          echo "测试目标URL连接..."
          curl -I ${{ secrets.CPA_BASE_URL }} || true
      
      - name: 运行 CPA 清理器 (FULL模式)
        id: cleanup
        env:
          CPA_BASE_URL: ${{ secrets.CPA_BASE_URL }}
          CPA_TOKEN: ${{ secrets.CPA_TOKEN }}
          CPA_CONCURRENCY: ${{ github.event.inputs.concurrency || '4' }}
        run: |
          python cpa_cleaner.py
      
      - name: 显示结果
        if: always()
        run: |
          echo "## CPA FULL模式清理结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 数量 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 状态 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 总文件数 | ${{ steps.cleanup.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Codex文件 | ${{ steps.cleanup.outputs.total_codex }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 删除 | ${{ steps.cleanup.outputs.deleted }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 启用 | ${{ steps.cleanup.outputs.enabled }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 禁用 | ${{ steps.cleanup.outputs.disabled }} |" >> $GITHUB_STEP_SUMMARY
