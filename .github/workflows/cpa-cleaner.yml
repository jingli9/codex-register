name: CPA 401 认证文件清理

on:
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      mode:
        description: '运行模式 (full 或 quick)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 测试网络连接
        run: |
          echo "测试网络连接..."
          curl -I https://www.google.com || true
      
      - name: 运行 CPA 清理器
        id: cleanup
        env:
          CPA_BASE_URL: ${{ secrets.CPA_BASE_URL }}
          CPA_TOKEN: ${{ secrets.CPA_TOKEN }}
          CPA_MODE: ${{ github.event.inputs.mode || 'full' }}
          CPA_CONCURRENCY: 4
        run: |
          python cpa_cleaner.py
      
      - name: 发送通知
        if: always()
        run: |
          echo "## CPA清理结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 状态: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 删除: ${{ steps.cleanup.outputs.deleted }}" >> $GITHUB_STEP_SUMMARY
          echo "- 启用: ${{ steps.cleanup.outputs.enabled }}" >> $GITHUB_STEP_SUMMARY
          echo "- 禁用: ${{ steps.cleanup.outputs.disabled }}" >> $GITHUB_STEP_SUMMARY
